<!DOCTYPE html>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Inter', sans-serif;
        }
        h1, h2, h3 {
            font-family: 'Manrope', sans-serif;
        }
        /* Tactical Calm No-Line Rule: Boundaries defined by background shifts */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Layer with Organic Structuralism -->
<div class="absolute inset-0 z-0">
<div class="absolute inset-0 bg-gradient-to-br from-primary/10 via-surface to-secondary/5"></div>
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-secondary-container/20 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-primary-container/10 rounded-full blur-[120px]"></div>
<img class="absolute inset-0 w-full h-full object-cover opacity-10 mix-blend-multiply" data-alt="expansive serene landscape of calm blue mountains and soft green valleys under a tranquil misty morning sky" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBk9HkWunJxFvoAM3R9F_6xDLyoeHRvnwTZVcl9BPLb9UrOL1RoFpnM-aTGq6zcU009AbfS0MNjZwinEV7ldGRbzQIEhx18GvR-lQUpofKj2onkj2pGuVmDehXEOYJBoltFmJCmGIPRM6_aCcbS6znr1njhSuMDVP2HaCERhuJi47oSU2mhUzkAsVz_l5pClXamvqn1aeJfM38ASIqrzQoUUH1Kk3YR6z3zskwkZKUwKpZ4V7rgH0bGuLblB2s2-LnTQ78gM1FQ8Jzz"/>
</div>
<!-- Login Shell -->
<main class="relative z-10 w-full max-w-md px-6 py-12">
<div class="surface-container-lowest rounded-xl shadow-sm overflow-hidden flex flex-col">
<!-- Branding Header -->
<div class="px-8 pt-10 pb-6 text-center">
<div class="inline-flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-weight="fill" style="font-variation-settings: 'FILL' 1;">
                        balance
                    </span>
</div>
<h1 class="text-2xl font-extrabold tracking-tight text-primary">Equilibrium Relief</h1>
<p class="text-on-surface-variant text-sm mt-2 font-medium">Resource Management Command Center</p>
</div>
<!-- Role Selection (The Stoic Orchestrator Approach) -->
<div class="px-8 pb-4">
<div class="bg-surface-container-low p-1 rounded-lg flex gap-1">
<button class="flex-1 py-2 text-xs font-semibold rounded-md bg-white text-primary shadow-sm transition-all">
                        Admin
                    </button>
<button class="flex-1 py-2 text-xs font-medium rounded-md text-on-surface-variant hover:bg-surface-container transition-all">
                        Inventory
                    </button>
<button class="flex-1 py-2 text-xs font-medium rounded-md text-on-surface-variant hover:bg-surface-container transition-all">
                        Camp
                    </button>
<button class="flex-1 py-2 text-xs font-medium rounded-md text-on-surface-variant hover:bg-surface-container transition-all">
                        Supplier
                    </button>
</div>
</div>
<!-- Credentials Form -->
<form class="px-8 pb-10 space-y-5">
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="email">Email Address</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">
                            alternate_email
                        </span>
<input class="w-full pl-10 pr-4 py-3 bg-surface-container-low border-0 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none text-on-surface placeholder:text-outline" id="email" placeholder="name@equilibrium.org" type="email"/>
</div>
</div>
<div class="space-y-1.5">
<label class="text-xs font-bold uppercase tracking-wider text-on-surface-variant px-1" for="password">Password</label>
<div class="relative group">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline-variant group-focus-within:text-primary transition-colors">
                            lock
                        </span>
<input class="w-full pl-10 pr-12 py-3 bg-surface-container-low border-0 rounded-lg text-sm focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-high transition-all outline-none text-on-surface placeholder:text-outline" id="password" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-outline-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-sm">visibility</span>
</button>
</div>
</div>
<div class="flex items-center justify-between py-1">
<label class="flex items-center gap-2 cursor-pointer group">
<input class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary/20" type="checkbox"/>
<span class="text-xs font-medium text-on-surface-variant group-hover:text-on-surface">Remember me</span>
</label>
<a class="text-xs font-semibold text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<button class="w-full py-4 bg-gradient-to-r from-primary to-primary-container text-white font-bold rounded-lg shadow-md hover:shadow-lg active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Sign In to Dashboard
                    <span class="material-symbols-outlined text-lg">arrow_forward</span>
</button>
</form>
<!-- Bottom Tonal Shift Section -->
<div class="bg-surface-container-low py-6 px-8 text-center">
<p class="text-xs text-on-surface-variant font-medium">
                    Need technical assistance? 
                    <a class="text-secondary font-bold hover:underline ml-1" href="#">Contact IT Support</a>
</p>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-4">
<span class="h-[1px] w-8 bg-outline-variant/30"></span>
<p class="text-[10px] font-bold uppercase tracking-[0.2em] text-outline">System Version 4.2.0-STABLE</p>
<span class="h-[1px] w-8 bg-outline-variant/30"></span>
</div>
<div class="flex gap-6">
<a class="text-[11px] text-on-surface-variant/70 hover:text-primary transition-colors font-medium" href="#">Privacy Protocol</a>
<a class="text-[11px] text-on-surface-variant/70 hover:text-primary transition-colors font-medium" href="#">Terms of Operations</a>
</div>
</div>
</main>
<!-- Floating Tooltip for Status (Tactical Calm Detail) -->
<div class="fixed bottom-6 right-6 hidden md:flex items-center gap-3 bg-white/80 backdrop-blur-md px-4 py-2 rounded-full shadow-sm border-0">
<span class="relative flex h-2 w-2">
<span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-secondary opacity-75"></span>
<span class="relative inline-flex rounded-full h-2 w-2 bg-secondary"></span>
</span>
<span class="text-[10px] font-bold text-on-surface-variant uppercase tracking-widest">Global Network Online</span>
</div>
</body></html>
